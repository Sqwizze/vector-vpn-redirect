<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Открываем приложение…</title>
</head>
<body>
  <p>Открываем приложение…</p>
  <p><a id="manualLink" href="#">Нажмите здесь, если приложение не открылось автоматически</a></p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const target = params.get("u");

    if (target) {
      document.getElementById("manualLink").href = target;
      window.location.href = target;
    }
  </script>
</body>
</html>
